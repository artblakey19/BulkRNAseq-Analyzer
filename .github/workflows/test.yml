name: Smoke test

# End-to-end sanity check using the fixture under tests/test_data.
# Builds no images — just resolves the DAG with the pipeline source and
# the test config to catch broken wildcards / missing inputs / rule typos.

on:
  push:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'report/**'
      - 'config/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'report/**'
      - 'config/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    env:
      XDG_CACHE_HOME: /tmp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install snakemake pandas pyyaml requests

      - name: Python compile check
        run: |
          python -m py_compile workflow/scripts/*.py

      - name: Network-free unit tests
        run: |
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Snakemake lint
        run: |
          snakemake \
            --snakefile workflow/Snakefile \
            --configfile tests/test_data/config_test.yaml \
            --lint

      - name: Snakemake dry-run with test fixture
        run: |
          snakemake \
            --snakefile workflow/Snakefile \
            --configfile tests/test_data/config_test.yaml \
            --dry-run \
            --printshellcmds

      - name: Snakemake dry-run with optional stages disabled
        run: |
          snakemake \
            --snakefile workflow/Snakefile \
            --configfile tests/test_data/config_disabled.yaml \
            --dry-run \
            --printshellcmds

  report-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install report R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          install-quarto: false
          packages: |
            any::yaml
            any::readr
            any::dplyr
            any::tidyr
            any::tibble
            any::ggplot2
            any::DT
            any::plotly
            any::htmltools
            any::knitr
            any::rmarkdown
            any::scales

      - name: Check report R dependencies
        run: |
          pkgs <- c("yaml", "readr", "dplyr", "tidyr", "tibble", "ggplot2",
                    "DT", "plotly", "htmltools", "knitr", "rmarkdown", "scales")
          missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]
          if (length(missing)) {
            stop("Missing report R package(s): ", paste(missing, collapse = ", "))
          }
        shell: Rscript {0}

      - name: Render minimal HTML report
        run: |
          quarto render report/template.qmd \
            --to html \
            --output-dir /tmp/report-smoke \
            -P config_path:tests/test_data/config_disabled.yaml \
            -P project_root:"$PWD"
