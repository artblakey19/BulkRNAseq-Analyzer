project:
  name: ''
  analyst: ''
  experiment:
    cell_line: ''
    compound: ''
    dose: ''
    duration: ''
    notes: ''
input:
  counts_tsv: ''
  multiqc_data_dir: ''
  samples_tsv: config/samples.tsv
  contrasts_tsv: config/contrasts.tsv
de:
  primary:
    padj: 0.05
    abs_lfc: 1.0
  secondary:
    padj: 0.1
    abs_lfc: 0.5
enrichment:
  enabled: true
  gsea:
    ranking: stat
    # Add/remove entries to change which MSigDB collections GSEA runs over.
    # `id` is the MSigDB collection string (fetched via msigdbr); `label` is
    # the display name used in the report and notebook.
    collections:
    - {id: H,                   label: Hallmark}
    - {id: C2:CP:REACTOME,      label: Reactome}
    - {id: C2:CP:WIKIPATHWAYS,  label: WikiPathways}
    - {id: C2:CP:PID,           label: PID}
    - {id: C2:CP:BIOCARTA,      label: BioCarta}
    - {id: C2:CGP,              label: CGP}
    - {id: C6,                  label: Oncogenic}
  ora:
    min_input_genes: 100
    max_input_genes: 500
    # `id` is the MSigDB collection string (fetched via msigdbr); KEGG is the
    # one special-cased id and is dispatched through enrichKEGG.
    databases:
    - {id: C5:GO:BP,        label: "GO Biological Process"}
    - {id: KEGG,            label: KEGG}
    - {id: C2:CP:REACTOME,  label: Reactome}
    - {id: H,               label: Hallmark}
tfea:
  enabled: true
  split_complexes: false
  min_size: 5
  padj_cutoff: 0.05
  top_n: 50
progeny:
  enabled: true
  top_targets: 500
cmap:
  enabled: true
  top_up: 250
  top_down: 250
report:
  formats:
  - html
  - pdf
