project:
  name: "test-fixture"
  analyst: "ci"
  experiment:
    cell_line: "A549"
    compound: "TestCompound"
    dose: "10 uM"
    duration: "24 h"
    notes: "test fixture"

input:
  counts_tsv: "tests/test_data/counts.tsv"
  multiqc_data_dir: "tests/test_data/multiqc_report_data"
  samples_tsv: "tests/test_data/samples.tsv"
  contrasts_tsv: "tests/test_data/contrasts.tsv"

de:
  primary:
    padj: 0.05
    abs_lfc: 1.0
  secondary:
    padj: 0.10
    abs_lfc: 0.5

enrichment:
  enabled: true
  gsea:
    ranking: "stat"
    collections:
      - {id: H, label: Hallmark}
  ora:
    min_input_genes: 100
    max_input_genes: 500
    databases:
      - {id: C5:GO:BP,        label: "GO Biological Process"}
      - {id: KEGG,            label: KEGG}
      - {id: C2:CP:REACTOME,  label: Reactome}
      - {id: H,               label: Hallmark}

tfea:
  enabled: true

progeny:
  enabled: true

cmap:
  enabled: true
  top_up: 250
  top_down: 250

report:
  formats: ["html"]
